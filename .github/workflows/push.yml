name: Push to Replicate

on:
  push:
    branches:
      - main

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Debug token presence
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: |
          if [ -z "${REPLICATE_API_TOKEN}" ]; then
            echo "REPLICATE_API_TOKEN is empty."
            exit 1
          fi
          echo "REPLICATE_API_TOKEN is set (length: ${#REPLICATE_API_TOKEN})"

      - name: Who am I on Replicate?
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: |
          curl -fsSL https://api.replicate.com/v1/account \
            -H "Authorization: Token ${REPLICATE_API_TOKEN}"

      - name: Install Cog
        run: |
          sudo curl -o /usr/local/bin/cog -L https://github.com/replicate/cog/releases/latest/download/cog_`uname -s`_`uname -m`
          sudo chmod +x /usr/local/bin/cog
          cog --version

      - name: Push to Replicate
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
        run: cog push r8.im/handodesign/whisperx-a40-large
