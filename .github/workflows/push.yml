name: Push to Replicate

on:
  push:
    branches:
      - main

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Cog
        run: |
          sudo curl -fsSL -o /usr/local/bin/cog "https://github.com/replicate/cog/releases/download/v0.10.0/cog_linux_amd64"
          sudo chmod +x /usr/local/bin/cog
          cog --version

      - name: Push to Replicate
        run: cog push r8.im/handodesign/whisperx-a40-large
        env:
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}

